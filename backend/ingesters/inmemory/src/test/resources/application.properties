# Quarkus Test Configuration
# This configuration is used when running tests with @QuarkusTest

# Use random port for tests to avoid conflicts with running application
quarkus.http.test-port=0

# WebSocket configuration for tests
quarkus.http.test-ssl-port=0

# Log level for tests
quarkus.log.level=INFO
quarkus.log.category."io.taktx".level=DEBUG

# Disable banner in tests for cleaner output
quarkus.banner.enabled=false

# Test timeout
quarkus.test.hang-detection-timeout=60s

