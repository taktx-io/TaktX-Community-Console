# Quarkus application properties for taktx-ingesters-inmemory
quarkus.application.name=taktx-ingesters-inmemory
quarkus.http.port=8084
quarkus.analytics.disabled=true

# CORS disabled - ingester is internal-only, accessed via Platform Service BFF
quarkus.http.cors.enabled=false

#taktx engine configuration
# IDE: localhost:9092w
# Docker Compose: kafka:9094
# AWS: kafka-broker-1:9092,kafka-broker-2:9092
bootstrap.servers=${BOOTSTRAP_SERVERS:localhost:9092}

# Topic prefix is <tenant-id>.<namespace>.<topicname> ? TaktXClient composes these two values.
# ??  WARNING: These values are baked into Kafka topic names and consumer group IDs.
# Changing TAKTX_ENGINE_TENANT_ID or TAKTX_ENGINE_NAMESPACE on a cluster that already has data is a
# BREAKING MIGRATION ? the ingester will subscribe to new (empty) topics and lose all
# committed offsets from the old ones. The engine must be restarted with matching values
# at the same time. Only change these on a fresh cluster or after a deliberate migration plan.
taktx.engine.tenant-id=${TAKTX_ENGINE_TENANT_ID:acme}
taktx.engine.namespace=${TAKTX_ENGINE_NAMESPACE:default}
taktx.client.groupId.instanceupdate=${TAKTX_CLIENT_GROUPID_INSTANCEUPDATE:taktx-ingesters-inmemory-instanceupdate}
taktx.ingester.instance-update.start-position=${TAKTX_INGESTER_INSTANCE_UPDATE_START_POSITION:RESUME}
taktx.ingester.instance-update.clear-store-before-replay=${TAKTX_INGESTER_INSTANCE_UPDATE_CLEAR_STORE_BEFORE_REPLAY:true}

# Instance update startup modes:
# - RESUME: use the client-managed consumer and continue from committed offsets (default)
# - EARLIEST: rebuild in-memory state by replaying the Kafka topic from the beginning on startup
# Optional replay-only Kafka property pass-through:
#   taktx.ingester.instance-update.kafka.security.protocol=SSL
#   taktx.ingester.instance-update.kafka.sasl.mechanism=SCRAM-SHA-512

# Adaptive retention for the in-memory ingester.
# Terminal process instances are evicted first when heap pressure rises.
taktx.ingester.retention.enabled=${TAKTX_INGESTER_RETENTION_ENABLED:true}
taktx.ingester.retention.check-interval=${TAKTX_INGESTER_RETENTION_CHECK_INTERVAL:PT30S}
taktx.ingester.retention.heap-target-watermark=${TAKTX_INGESTER_RETENTION_HEAP_TARGET_WATERMARK:0.65}
taktx.ingester.retention.heap-high-watermark=${TAKTX_INGESTER_RETENTION_HEAP_HIGH_WATERMARK:0.80}
taktx.ingester.retention.min-terminal-instances=${TAKTX_INGESTER_RETENTION_MIN_TERMINAL_INSTANCES:5000}
taktx.ingester.retention.max-terminal-instances=${TAKTX_INGESTER_RETENTION_MAX_TERMINAL_INSTANCES:25000}
taktx.ingester.retention.min-flow-node-updates=${TAKTX_INGESTER_RETENTION_MIN_FLOW_NODE_UPDATES:150000}
taktx.ingester.retention.max-flow-node-updates=${TAKTX_INGESTER_RETENTION_MAX_FLOW_NODE_UPDATES:750000}
taktx.ingester.retention.min-retained-bytes=${TAKTX_INGESTER_RETENTION_MIN_RETAINED_BYTES:268435456}
taktx.ingester.retention.max-retained-bytes=${TAKTX_INGESTER_RETENTION_MAX_RETAINED_BYTES:1073741824}
taktx.ingester.retention.evict-batch-size=${TAKTX_INGESTER_RETENTION_EVICT_BATCH_SIZE:250}
taktx.ingester.retention.min-terminal-age=${TAKTX_INGESTER_RETENTION_MIN_TERMINAL_AGE:PT5M}

