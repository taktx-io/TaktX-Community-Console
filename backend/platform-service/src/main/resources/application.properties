# Quarkus application properties for taktx-platform-service
quarkus.application.name=taktx-platform-service
quarkus.application.version=${TAKTX_APP_VERSION:0.0.0-dev}
quarkus.http.port=8080
quarkus.analytics.disabled=true

# CORS Configuration
#
# IDE dev  (npm run dev + quarkusDev):
#   Frontend on :3001, platform service on :8080 ? different origins ? CORS required.
#   Default: enabled, allows localhost:3001 and localhost:3002.
#
# Docker Compose / AWS ECS (with nginx or ALB reverse proxy):
#   Browser talks to proxy on a single origin. Proxy forwards /api/* internally.
#   No cross-origin requests ? CORS must be DISABLED (set QUARKUS_HTTP_CORS_ENABLED=false).
#
quarkus.http.cors.enabled=${QUARKUS_HTTP_CORS_ENABLED:true}
quarkus.http.cors.origins=${QUARKUS_HTTP_CORS_ORIGINS:http://localhost:3001,http://localhost:3002}
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH

# Security: Allow OPTIONS requests (CORS preflight) to bypass authentication
# This is critical for CORS to work with authenticated endpoints
quarkus.http.auth.permission.options.paths=/*
quarkus.http.auth.permission.options.methods=OPTIONS
quarkus.http.auth.permission.options.policy=permit

# Security: Allow public access to health endpoints (used by Docker healthcheck, load balancers)
quarkus.http.auth.permission.health.paths=/health,/health/*
quarkus.http.auth.permission.health.policy=permit

# Security: Require authentication for all other API endpoints
quarkus.http.auth.permission.authenticated.paths=/api/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# Proxy configuration - trust X-Forwarded-* headers when behind ALB/nginx
# Enable in Docker Compose and production (behind reverse proxy)
quarkus.http.proxy.proxy-address-forwarding=${QUARKUS_HTTP_PROXY_ENABLED:false}
quarkus.http.proxy.allow-x-forwarded=true
quarkus.http.proxy.enable-forwarded-host=true

# OIDC Observability - log authentication events for monitoring and troubleshooting
quarkus.log.category."io.quarkus.oidc".level=INFO
quarkus.log.category."io.quarkus.security".level=INFO

# Cache configuration (Caffeine)
quarkus.cache.caffeine."permissions".initial-capacity=100
quarkus.cache.caffeine."permissions".maximum-size=1000
quarkus.cache.caffeine."permissions".expire-after-write=60S

taktx.platform.ingester.url=${TAKTX_PLATFORM_INGESTER_URL:http://localhost:8084}

# Health check
quarkus.smallrye-health.root-path=/health
