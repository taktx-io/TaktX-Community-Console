# Test configuration for platform-service
quarkus.application.name=taktx-platform-service-test
quarkus.http.test-port=0
quarkus.analytics.disabled=true

# Use H2 in-memory database for tests (faster than Testcontainers PostgreSQL)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Liquibase - enable migrations in tests to verify schema creation
quarkus.liquibase.migrate-at-start=true

# Cache configuration
quarkus.cache.caffeine."permissions".initial-capacity=10
quarkus.cache.caffeine."permissions".maximum-size=100
quarkus.cache.caffeine."permissions".expire-after-write=5S


# Disable OIDC for unit tests
quarkus.oidc.enabled=false

# Disable security checks completely in tests
# This makes @Authenticated annotations not enforce authentication
quarkus.security.jaxrs.deny-unannotated-endpoints=false
# Proactive auth must be enabled so @TestSecurity identities are propagated into CDI-injected
# SecurityIdentity beans. Without this, injected SecurityIdentity is always anonymous.
quarkus.http.auth.proactive=true

# Disable permission interceptor in tests (skip @RequiresPermission checks)
taktx.permissions.enabled=false

# Disable license enforcement in tests (skip cluster/namespace limit checks)
taktx.license.enforcement.enabled=false

# Override the main config's authentication policy - permit all API endpoints in tests
quarkus.http.auth.permission.authenticated.policy=permit

# Add explicit permit for health endpoints
quarkus.http.auth.permission.health.paths=/health,/health/*
quarkus.http.auth.permission.health.policy=permit

# Infrastructure initialization for tests (creates default cluster and namespace)
taktx.init.cluster.name=local
taktx.init.cluster.kafka-bootstrap-servers=kafka:9094
taktx.init.cluster.description=Local test cluster
taktx.init.namespace.name=default
taktx.init.namespace.description=Default test namespace
taktx.init.namespace.ingester-url=http://localhost:8084

