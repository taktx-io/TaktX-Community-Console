name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'release/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend build and test
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Build backend with Gradle
        run: ./gradlew build

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend/**/build/reports/tests/**
            backend/**/build/test-results/**
            backend/**/build/reports/problems/**
          retention-days: 30

      - name: Publish backend test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Gradle Tests
          path: 'backend/**/build/test-results/**/*.xml'
          reporter: java-junit
          fail-on-error: false

  frontend:
    name: Frontend lint, test, and build
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: frontend/taktx-console

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/taktx-console/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend unit tests
        run: npm test -- --ci --runInBand

      - name: Build frontend
        run: npm run build

  docker-build:
    name: Docker build validation
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: taktx-community-platform-service
            context: ./backend
            file: ./backend/platform-service/Dockerfile
            build_args: ""
          - image_name: taktx-community-ingester-inmemory
            context: ./backend
            file: ./backend/ingesters/inmemory/Dockerfile
            build_args: ""
          - image_name: taktx-community-console-frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            build_args: |
              NEXT_PUBLIC_PLATFORM_SERVICE_URL=

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image_name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: false
          load: false
          provenance: false
          sbom: false
          tags: local/${{ matrix.image_name }}:ci
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

