name: Release
on:
  push:
    tags:
      - '*'
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false
jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      original_tag: ${{ steps.version.outputs.original_tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      publish_latest: ${{ steps.version.outputs.publish_latest }}
      ghcr_owner: ${{ steps.owner.outputs.value }}
    steps:
      - name: Normalize and validate release version
        id: version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          if [ -z "$VERSION" ]; then
            echo "Release tag name is empty" >&2
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag '$TAG' must be semver-like, for example v1.2.3 or 1.2.3" >&2
            exit 1
          fi

          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE=true
            PUBLISH_LATEST=false
          else
            IS_PRERELEASE=false
            PUBLISH_LATEST=true
          fi

          echo "original_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "publish_latest=$PUBLISH_LATEST" >> "$GITHUB_OUTPUT"
          echo "Using release version: $VERSION"
      - name: Normalize GHCR owner
        id: owner
        shell: bash
        run: |
          OWNER="${{ github.repository_owner }}"
          OWNER_LOWER=$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "value=$OWNER_LOWER" >> "$GITHUB_OUTPUT"
          echo "Using GHCR owner: $OWNER_LOWER"
  publish-images:
    name: Publish Docker images
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: taktx-community-platform-service
            context: ./backend
            file: ./backend/platform-service/Dockerfile
            build_args: |
              TAKTX_APP_VERSION=${{ needs.prepare.outputs.version }}
          - image_name: taktx-community-ingester-inmemory
            context: ./backend
            file: ./backend/ingesters/inmemory/Dockerfile
            build_args: |
              TAKTX_APP_VERSION=${{ needs.prepare.outputs.version }}
          - image_name: taktx-community-console-frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            build_args: |
              NEXT_PUBLIC_PLATFORM_SERVICE_URL=
              NEXT_PUBLIC_APP_VERSION=${{ needs.prepare.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.prepare.outputs.ghcr_owner }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable=${{ needs.prepare.outputs.publish_latest }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image_name }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          build-args: ${{ matrix.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.image_name }}

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [prepare, publish-images]
    permissions:
      contents: write
    steps:
      - name: Create release from tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.original_tag }}
          name: ${{ needs.prepare.outputs.original_tag }}
          generate_release_notes: true
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
