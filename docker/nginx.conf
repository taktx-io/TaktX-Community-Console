events {
    worker_connections 1024;
}

http {
    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # Upstream definitions
    upstream frontend {
        server taktx-console-frontend:3000;
    }

    upstream platform {
        server taktx-platform-service:8080;
    }

    upstream ingester {
        server taktx-ingester-inmemory:8084;
    }

    # Main server block
    server {
        listen 0.0.0.0:80;
        server_name localhost;

        # Increase buffer sizes for large headers (OAuth tokens, cookies, etc.)
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        large_client_header_buffers 4 32k;

        # Platform Service API — /api/* is routed to the platform service.
        # Must be defined before / to take precedence.
        # NextAuth routes (/api/auth/*) are served by Next.js, which nginx reaches
        # via the frontend upstream — but /api/auth/ is a subset of /api/ so we
        # must explicitly route it to the frontend first.
        location /api/auth/ {
            proxy_pass http://frontend/api/auth/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://platform/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket endpoint — browser opens ws(s)://host/ws/process-events
        # nginx proxies to the ingester container whose hostname is only reachable
        # inside the Docker network, never by the browser directly.
        location /ws/ {
            proxy_pass http://ingester/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Keep idle WS connections alive; ingester heartbeats every 30 s
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Frontend — all other requests served by Next.js
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint for nginx itself
        location /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
